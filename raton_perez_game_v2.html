<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Casita de los Ratones - Selección de Jugadores</title>
    <style>
        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            background: linear-gradient(135deg, #87CEEB 0%, #E6F3FF 100%);
            margin: 0;
            padding: 0;
            min-height: 100vh;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            padding: 30px 20px 40px 20px;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header-title {
            font-size: 2.2em;
            color: #4A90E2;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.08);
            letter-spacing: 1px;
        }
        .players-row {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 30px;
            margin-bottom: 30px;
        }
        .player-slot {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #F0F8FF;
            border: 3px dashed #4A90E2;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            flex-direction: column;
            transition: border 0.2s, background 0.2s;
        }
        .player-slot.filled {
            border: 3px solid #4A90E2;
            /* El color de fondo se setea inline según el ratón */
        }
        .player-avatar {
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .player-name {
            font-size: 1em;
            font-weight: bold;
            color: #2C3E50;
            text-align: center;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-top: 10px;
            margin-bottom: 2px;
        }
        .remove-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            background: #FF6B6B;
            color: #fff;
            border: none;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            font-size: 1.2em;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        .add-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #4CAF50;
            color: #fff;
            font-size: 2.2em;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background 0.2s;
            margin: 0 auto;
        }
        .add-btn:hover {
            background: #388E3C;
        }
        .start-btn {
            display: block;
            margin: 0 auto;
            margin-top: 20px;
            padding: 14px 40px;
            font-size: 1.2em;
            border: none;
            border-radius: 25px;
            background: #4A90E2;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .start-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        /* Modal */
        .modal-bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.25);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal {
            background: #fff;
            border-radius: 18px;
            padding: 30px 24px 24px 24px;
            min-width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.18);
            position: relative;
        }
        .modal-title {
            font-size: 1.3em;
            color: #4A90E2;
            margin-bottom: 18px;
            text-align: center;
        }
        .modal-label {
            font-size: 1em;
            margin-bottom: 6px;
            color: #2C3E50;
        }
        .modal input[type="text"] {
            width: 100%;
            padding: 8px 10px;
            font-size: 1em;
            border-radius: 8px;
            border: 1.5px solid #4A90E2;
            margin-bottom: 18px;
            outline: none;
        }
        .raton-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-bottom: 18px;
        }
        .raton-option {
            width: 54px;
            height: 54px;
            border-radius: 50%;
            border: 2.5px solid #4A90E2;
            background: #F0F8FF;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: border 0.2s, box-shadow 0.2s;
            position: relative;
        }
        .raton-option.selected {
            border: 3px solid #FFB800;
            box-shadow: 0 0 0 3px #FFF3C0;
        }
        .raton-option.disabled {
            opacity: 0.4;
            pointer-events: none;
        }
        .raton-svg {
            width: 38px;
            height: 38px;
        }
        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 16px;
        }
        .modal-btn {
            padding: 8px 22px;
            font-size: 1em;
            border: none;
            border-radius: 18px;
            background: #4A90E2;
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }
        .modal-btn.cancel {
            background: #FF6B6B;
        }
        .modal-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .error-msg {
            color: #FF6B6B;
            font-size: 0.95em;
            text-align: center;
            margin-bottom: 10px;
        }
        
        /* Estilos del juego multiplayer */
        .game-screen {
            display: none;
        }
        
        .game-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            padding: 20px;
        }
        
        .game-header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .game-title {
            font-size: 2.5em;
            color: #4A90E2;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        
        .players-dashboard {
            display: flex;
            justify-content: space-around;
            align-items: center;
            margin-bottom: 20px;
            padding: 15px;
            background: #F0F8FF;
            border-radius: 10px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .player-status {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-width: 200px;
        }
        
        .player-status.current-turn {
            background: #FFF3C0;
            border: 2px solid #FFB800;
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .player-status.finished {
            background: #E8F5E8;
            border: 2px solid #4CAF50;
        }
        
        .player-avatar-small {
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .player-info-text {
            flex: 1;
        }
        
        .player-name-small {
            font-size: 0.9em;
            font-weight: bold;
            color: #2C3E50;
            margin-bottom: 2px;
        }
        
        .player-stats {
            font-size: 0.8em;
            color: #666;
        }
        
        .game-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        
        .dice-container {
            text-align: center;
        }
        
        .dice {
            width: 80px;
            height: 80px;
            background: white;
            border: 3px solid #4A90E2;
            border-radius: 15px;
            display: inline-block;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            margin: 0 10px;
        }
        
        .dice:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        
        .dice.rolling {
            animation: roll 0.6s ease-in-out;
        }
        
        @keyframes roll {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(180deg); }
            100% { transform: rotate(360deg); }
        }
        
        .dice-dot {
            width: 12px;
            height: 12px;
            background: #4A90E2;
            border-radius: 50%;
            position: absolute;
        }
        
        .game-button {
            padding: 12px 25px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s ease;
            font-weight: bold;
        }
        
        .roll-button {
            background: #4A90E2;
            color: white;
        }
        
        .roll-button:hover {
            background: #357ABD;
            transform: translateY(-2px);
        }
        
        .roll-button:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        
        .board-container {
            position: relative;
            background: #F8F9FA;
            padding: 30px;
            border-radius: 15px;
            border: 3px solid #4A90E2;
            margin-top: 20px;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 8px;
            position: relative;
        }
        
        .cell {
            width: 70px;
            height: 70px;
            border: 2px solid #ddd;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2em;
            font-weight: normal;
            position: relative;
            background: white;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        
        .cell.special, .cell.start, .cell.finish {
            border-radius: 18px !important;
        }
        
        .cell-emoji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 2.2em;
            z-index: 1;
            opacity: 0.7;
            pointer-events: none;
        }
        
        .cell-label {
            position: relative;
            z-index: 2;
            font-size: 1em !important;
            font-weight: normal;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
        }
        
        .cell-label.bold {
            font-weight: bold;
        }
        
        .cell.start {
            background: #90EE90;
            border-color: #32CD32;
            border-radius: 10px;
        }
        
        .cell.finish {
            background: #FFD700;
            border-color: #FFA500;
            border-radius: 10px;
        }
        
        .cell.special {
            background: #FFB6C1;
            border-color: #FF69B4;
        }
        
        .cell.selected-correct {
            box-shadow: 0 0 0 4px #4AE24A;
            border-color: #4AE24A;
            animation: pop 0.3s;
        }
        
        .cell.selected-wrong {
            box-shadow: 0 0 0 4px #FF6B6B;
            border-color: #FF6B6B;
            animation: shake 0.3s;
        }
        
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        
        .player-token {
            position: absolute;
            top: -10px;
            left: -10px;
            z-index: 10;
            animation: bounce 0.5s ease-in-out;
            width: 50px;
            height: 50px;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }
        
        .message {
            text-align: center;
            padding: 15px;
            margin: 20px 0;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: bold;
        }
        
        .message.win {
            background: #90EE90;
            color: #2E8B57;
        }
        
        .message.info {
            background: #E6F3FF;
            color: #4A90E2;
        }
        
        .message.error {
            background: #FFEBEE;
            color: #D32F2F;
        }
        
        .ranking-modal {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        
        .ranking-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 500px;
            text-align: center;
        }
        
        .ranking-title {
            font-size: 2em;
            color: #4A90E2;
            margin-bottom: 20px;
        }
        
        .ranking-list {
            margin: 20px 0;
        }
        
        .ranking-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px;
            margin: 5px 0;
            border-radius: 10px;
            background: #F8F9FA;
        }
        
        .ranking-position {
            font-size: 1.5em;
            font-weight: bold;
            color: #4A90E2;
            min-width: 40px;
        }
        
        .back-to-menu-btn {
            background: #4A90E2;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="header-title">🐭 LA CASITA DE LOS RATONES 🐭</h1>
        </div>
        <div class="players-row" id="playersRow">
            <!-- Slots de jugadores -->
        </div>
        <button class="start-btn" id="startBtn" disabled>COMENZAR JUEGO</button>
    </div>

    <!-- Modal para agregar jugador -->
    <div class="modal-bg" id="modalBg" style="display:none;">
        <div class="modal">
            <div class="modal-title">AGREGAR JUGADOR</div>
            <div class="modal-label">NOMBRE DEL JUGADOR</div>
            <input type="text" id="playerNameInput" maxlength="12" autocomplete="off" />
            <div class="modal-label">ELIGE TU RATÓN</div>
            <div class="raton-list" id="ratonList">
                <!-- Opciones de ratones -->
            </div>
            <div class="error-msg" id="modalError"></div>
            <div class="modal-actions">
                <button class="modal-btn" id="addPlayerBtn">AGREGAR</button>
                <button class="modal-btn cancel" id="cancelModalBtn">CANCELAR</button>
            </div>
        </div>
    </div>

    <!-- Pantalla del juego -->
    <div class="game-screen" id="gameScreen">
        <div class="game-container">
            <div class="game-header">
                <h1 class="game-title">🐭 EL JUEGO DEL RATÓN PÉREZ 🦷</h1>
                <p>¡AYUDA A LOS RATONES A RECOGER TODOS LOS DIENTES SIGUIENDO EL SENDERO SERPENTEANTE!</p>
            </div>
            
            <div class="players-dashboard" id="playersDashboard">
                <!-- Dashboard de jugadores se genera dinámicamente -->
            </div>

            <div class="game-controls">
                <div class="dice-container">
                    <div class="dice" id="dice" onclick="rollDice()"></div>
                    <button class="game-button roll-button" id="rollBtn" onclick="rollDice()">🎲 LANZAR DADO</button>
                </div>
            </div>
            
            <div id="message" class="message info">¡ESPERANDO QUE EL PRIMER JUGADOR LANZE EL DADO!</div>
            
            <div class="board-container">
                <div class="board" id="board"></div>
            </div>
        </div>
    </div>

    <!-- Modal de ranking final -->
    <div class="ranking-modal" id="rankingModal">
        <div class="ranking-content">
            <h2 class="ranking-title">🏆 RANKING FINAL</h2>
            <div class="ranking-list" id="rankingList">
                <!-- Ranking se genera dinámicamente -->
            </div>
            <button class="back-to-menu-btn" onclick="backToMenu()">VOLVER AL MENÚ</button>
        </div>
    </div>

    <script>
    // --- SVGs de ejemplo para 10 ratones (5 ratoncitos, 5 ratoncitas) ---
    // Puedes reemplazar estos SVGs por otros más adelante
    const RATONES = [
        // Ratoncitos (masculinos, colores/accesorios variados)
        { id: 'raton1', svg: `<svg class='raton-svg' viewBox='0 0 60 60'><ellipse cx='30' cy='38' rx='18' ry='16' fill='#BCAAA4'/><ellipse cx='18' cy='18' rx='8' ry='10' fill='#BCAAA4'/><ellipse cx='42' cy='18' rx='8' ry='10' fill='#BCAAA4'/><ellipse cx='30' cy='38' rx='12' ry='10' fill='#FFF'/><circle cx='24' cy='36' r='2' fill='#000'/><circle cx='36' cy='36' r='2' fill='#000'/><ellipse cx='30' cy='44' rx='3' ry='2' fill='#FFB6B6'/></svg>`, label: 'Ratón Gris' },

        { id: 'raton4', svg: `<svg class='raton-svg' viewBox='0 0 60 60'><ellipse cx='30' cy='38' rx='18' ry='16' fill='#FFD54F'/><ellipse cx='18' cy='18' rx='8' ry='10' fill='#FFD54F'/><ellipse cx='42' cy='18' rx='8' ry='10' fill='#FFD54F'/><ellipse cx='30' cy='38' rx='12' ry='10' fill='#FFF'/><circle cx='24' cy='36' r='2' fill='#000'/><circle cx='36' cy='36' r='2' fill='#000'/><ellipse cx='30' cy='44' rx='3' ry='2' fill='#FFB6B6'/></svg>`, label: 'Ratón Amarillo' },
        { id: 'raton5', svg: `<svg class='raton-svg' viewBox='0 0 60 60'><ellipse cx='30' cy='38' rx='18' ry='16' fill='#FF8A65'/><ellipse cx='18' cy='18' rx='8' ry='10' fill='#FF8A65'/><ellipse cx='42' cy='18' rx='8' ry='10' fill='#FF8A65'/><ellipse cx='30' cy='38' rx='12' ry='10' fill='#FFF'/><circle cx='24' cy='36' r='2' fill='#000'/><circle cx='36' cy='36' r='2' fill='#000'/><ellipse cx='30' cy='44' rx='3' ry='2' fill='#FFB6B6'/></svg>`, label: 'Ratón Naranja' },
        // Ratoncitas (femeninas, SVGs con lazo, flor, etc.)
        { id: 'ratona1', svg: `<svg class='raton-svg' viewBox='0 0 60 60'><ellipse cx='30' cy='38' rx='18' ry='16' fill='#F8BBD0'/><ellipse cx='18' cy='18' rx='8' ry='10' fill='#F8BBD0'/><ellipse cx='42' cy='18' rx='8' ry='10' fill='#F8BBD0'/><ellipse cx='30' cy='38' rx='12' ry='10' fill='#FFF'/><circle cx='24' cy='36' r='2' fill='#000'/><circle cx='36' cy='36' r='2' fill='#000'/><ellipse cx='30' cy='44' rx='3' ry='2' fill='#FFB6B6'/><ellipse cx='42' cy='10' rx='3' ry='2' fill='#FF69B4' transform='rotate(-20 42 10)'/></svg>`, label: 'Ratona Rosa' },
        { id: 'ratona2', svg: `<svg class='raton-svg' viewBox='0 0 60 60'><ellipse cx='30' cy='38' rx='18' ry='16' fill='#CE93D8'/><ellipse cx='18' cy='18' rx='8' ry='10' fill='#CE93D8'/><ellipse cx='42' cy='18' rx='8' ry='10' fill='#CE93D8'/><ellipse cx='30' cy='38' rx='12' ry='10' fill='#FFF'/><circle cx='24' cy='36' r='2' fill='#000'/><circle cx='36' cy='36' r='2' fill='#000'/><ellipse cx='30' cy='44' rx='3' ry='2' fill='#FFB6B6'/><ellipse cx='18' cy='10' rx='3' ry='2' fill='#BA68C8' transform='rotate(20 18 10)'/></svg>`, label: 'Ratona Lila' },
        { id: 'ratona3', svg: `<svg class='raton-svg' viewBox='0 0 60 60'><ellipse cx='30' cy='38' rx='18' ry='16' fill='#FFF176'/><ellipse cx='18' cy='18' rx='8' ry='10' fill='#FFF176'/><ellipse cx='42' cy='18' rx='8' ry='10' fill='#FFF176'/><ellipse cx='30' cy='38' rx='12' ry='10' fill='#FFF'/><circle cx='24' cy='36' r='2' fill='#000'/><circle cx='36' cy='36' r='2' fill='#000'/><ellipse cx='30' cy='44' rx='3' ry='2' fill='#FFB6B6'/><ellipse cx='30' cy='8' rx='4' ry='2' fill='#FFB6B6'/></svg>`, label: 'Ratona Amarilla' },
        { id: 'ratona4', svg: `<svg class='raton-svg' viewBox='0 0 60 60'><ellipse cx='30' cy='38' rx='18' ry='16' fill='#A5D6A7'/><ellipse cx='18' cy='18' rx='8' ry='10' fill='#A5D6A7'/><ellipse cx='42' cy='18' rx='8' ry='10' fill='#A5D6A7'/><ellipse cx='30' cy='38' rx='12' ry='10' fill='#FFF'/><circle cx='24' cy='36' r='2' fill='#000'/><circle cx='36' cy='36' r='2' fill='#000'/><ellipse cx='30' cy='44' rx='3' ry='2' fill='#FFB6B6'/><ellipse cx='30' cy='8' rx='2' ry='2' fill='#FF69B4'/></svg>`, label: 'Ratona Verde' },
        { id: 'ratona5', svg: `<svg class='raton-svg' viewBox='0 0 60 60'><ellipse cx='30' cy='38' rx='18' ry='16' fill='#BCAAA4'/><ellipse cx='18' cy='18' rx='8' ry='10' fill='#BCAAA4'/><ellipse cx='42' cy='18' rx='8' ry='10' fill='#BCAAA4'/><ellipse cx='30' cy='38' rx='12' ry='10' fill='#FFF'/><circle cx='24' cy='36' r='2' fill='#000'/><circle cx='36' cy='36' r='2' fill='#000'/><ellipse cx='30' cy='44' rx='3' ry='2' fill='#FFB6B6'/><ellipse cx='30' cy='8' rx='2' ry='2' fill='#FFB6B6'/></svg>`, label: 'Ratona Gris' },
    ];

    // Tabla de colores suaves para cada ratón
    const RATON_COLORS = {
        'raton1': '#E0D7CF', // gris
        'raton2': '#D6F5D6', // verde
        'raton3': '#D6ECFA', // celeste
        'raton4': '#FFF6D6', // amarillo
        'raton5': '#FFE2D6', // naranja
        'ratona1': '#FDE3F1', // rosa
        'ratona2': '#F3E3FD', // lila
        'ratona3': '#FFF9D6', // amarillo claro
        'ratona4': '#E3FDE3', // verde claro
        'ratona5': '#E0D7CF', // gris claro
    };

    let players = [];
    let selectedRatonId = null;
    let editingIndex = null;

    function renderPlayers() {
        const row = document.getElementById('playersRow');
        row.innerHTML = '';
        for (let i = 0; i < 4; i++) {
            if (players[i]) {
                const p = players[i];
                const slotWrapper = document.createElement('div');
                slotWrapper.style.display = 'flex';
                slotWrapper.style.flexDirection = 'column';
                slotWrapper.style.alignItems = 'center';
                slotWrapper.style.justifyContent = 'center';
                slotWrapper.style.width = '120px';
                slotWrapper.style.margin = '0 0';
                const slot = document.createElement('div');
                slot.className = 'player-slot filled';
                slot.style.background = RATON_COLORS[p.ratonId] || '#E6F3FF';
                slot.innerHTML = `
                    <div class='player-avatar'>${RATONES.find(r => r.id === p.ratonId).svg}</div>
                    <button class='remove-btn' onclick='removePlayer(${i})' title='Quitar jugador'>-</button>
                `;
                const nameDiv = document.createElement('div');
                nameDiv.className = 'player-name';
                nameDiv.textContent = p.name.toUpperCase();
                slotWrapper.appendChild(slot);
                slotWrapper.appendChild(nameDiv);
                row.appendChild(slotWrapper);
            } else {
                const slotWrapper = document.createElement('div');
                slotWrapper.style.display = 'flex';
                slotWrapper.style.flexDirection = 'column';
                slotWrapper.style.alignItems = 'center';
                slotWrapper.style.justifyContent = 'center';
                slotWrapper.style.width = '120px';
                slotWrapper.style.margin = '0 0';
                const slot = document.createElement('div');
                slot.className = 'player-slot';
                slot.innerHTML = `<button class='add-btn' onclick='openAddPlayerModal()'>+</button>`;
                slotWrapper.appendChild(slot);
                row.appendChild(slotWrapper);
            }
        }
        document.getElementById('startBtn').disabled = players.length < 1;
    }

    function openAddPlayerModal() {
        selectedRatonId = null;
        editingIndex = null;
        document.getElementById('playerNameInput').value = '';
        document.getElementById('modalError').textContent = '';
        renderRatones();
        document.getElementById('modalBg').style.display = 'flex';
    }

    function closeAddPlayerModal() {
        document.getElementById('modalBg').style.display = 'none';
    }

    function renderRatones() {
        const list = document.getElementById('ratonList');
        list.innerHTML = '';
        RATONES.forEach(raton => {
            const taken = players.some(p => p.ratonId === raton.id);
            const div = document.createElement('div');
            div.className = 'raton-option' + (selectedRatonId === raton.id ? ' selected' : '') + (taken ? ' disabled' : '');
            div.innerHTML = raton.svg;
            div.title = raton.label;
            if (!taken) {
                div.onclick = () => {
                    selectedRatonId = raton.id;
                    renderRatones();
                };
            }
            list.appendChild(div);
        });
    }

    document.getElementById('addPlayerBtn').onclick = function() {
        const name = document.getElementById('playerNameInput').value.trim();
        if (!name) {
            document.getElementById('modalError').textContent = '¡Elige un nombre!';
            return;
        }
        if (players.some(p => p.name.toLowerCase() === name.toLowerCase())) {
            document.getElementById('modalError').textContent = '¡Ese nombre ya está en uso!';
            return;
        }
        if (!selectedRatonId) {
            document.getElementById('modalError').textContent = '¡Elige un ratón!';
            return;
        }
        players.push({ name, ratonId: selectedRatonId });
        closeAddPlayerModal();
        renderPlayers();
    };
    document.getElementById('cancelModalBtn').onclick = closeAddPlayerModal;

    window.removePlayer = function(idx) {
        players.splice(idx, 1);
        renderPlayers();
    };

    document.getElementById('startBtn').onclick = function() {
        alert('¡Comenzar juego! (Aquí iría la lógica para iniciar el tablero multiplayer)');
    };

    // Inicializar
    renderPlayers();
    </script>
</body>
